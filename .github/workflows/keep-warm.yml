name: keep-warm
# Pings the free Render service so it never sleeps (cold start is ~50s otherwise).
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min (Render sleeps after 15 min idle)
  workflow_dispatch:          # allow manual run
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping both boxes /health
        run: |
          for u in \
            https://libreoffice-convert-xikc.onrender.com/health \
            https://calibre-convert.onrender.com/health ; do
            curl -sf -m 60 "$u" && echo " OK  $u" || echo "ping failed (waking) $u"
          done
